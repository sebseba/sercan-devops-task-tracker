# SonarQube project settings for devops-task-tracker (Node.js / JavaScript)
sonar.projectKey=devops-task-tracker
sonar.projectName=DevOps Task Tracker
sonar.projectVersion=1.0

# Source and tests
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep analysis focused on your code
sonar.exclusions=**/node_modules/**,**/coverage/**,**/public/**,**/deliverables/**,**/deploy/**

# Encoding
sonar.sourceEncoding=UTF-8
